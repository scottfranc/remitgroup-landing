<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="remitgroup.com — Premium global domain available for strategic acquisition. Private treaty sale to qualified buyers." />
  <meta name="robots" content="index, follow" />
  <title>remitgroup.com — Available for Acquisition</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Archivo,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column}
    .monolith{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .domain{font-size:clamp(2rem,8vw,6rem);font-weight:600;letter-spacing:-.03em;line-height:1;text-transform:lowercase}
    .domain .dot{color:#333}
    .status{font-size:clamp(.75rem,2vw,.9375rem);font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#a3a3a3;margin-top:2.5rem}
    .tier{font-size:clamp(.5rem,1.2vw,.6875rem);font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:#444;margin-top:.875rem}
    .bottom{padding:2rem 2rem 3rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
    .cta{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-size:clamp(.6875rem,1.8vw,.8125rem);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#000;text-decoration:none;background:#fff;border:2px solid #fff;padding:1.125rem 2.75rem;transition:background .2s,color .2s,box-shadow .2s,transform .15s;box-shadow:0 0 0 0 rgba(255,255,255,.0)}
    .cta:hover{background:transparent;color:#fff;box-shadow:0 0 40px rgba(255,255,255,.08);transform:translateY(-1px)}
    .cta:focus-visible{outline:2px solid #fff;outline-offset:4px}
    .cta svg{flex-shrink:0}
    .cta-note{font-size:.5625rem;letter-spacing:.15em;text-transform:uppercase;color:#525252}
  </style>
</head>
<body>
  <div class="monolith">
    <h1 class="domain">remitgroup<span class="dot">.</span>com</h1>
    <p class="status">Available for Strategic Acquisition</p>
    <p class="tier">Private Treaty · Qualified Buyers Only</p>
  </div>
  <div class="bottom">
    <a class="cta" href="mailto:acquire@remitgroup.com?subject=Acquisition%20Inquiry%20%E2%80%94%20remitgroup.com">
      Strategic Acquisition Inquiries — Contact Us
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <p class="cta-note">Confidential inquiries welcome</p>
  </div>
</body>
</html>
