<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remit Group — Design Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #0c0c0e; color: #e4e4e7; min-height: 100vh; }
    .wrap { max-width: 72rem; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.5rem; }
    .intro { color: #a1a1aa; max-width: 55ch; margin-bottom: 2.5rem; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(18rem, 1fr)); gap: 1.25rem; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden; transition: border-color 0.2s, transform 0.15s; text-decoration: none; color: inherit; display: block; }
    .card:hover { border-color: #52525b; transform: translateY(-2px); }
    .card.kept { border-color: #0f4c81; }
    .card.kept:hover { border-color: #3b82f6; }
    .preview { height: 9rem; position: relative; overflow: hidden; }
    .preview iframe { width: 200%; height: 200%; border: 0; transform: scale(0.5); transform-origin: top left; pointer-events: none; }
    .meta { padding: 1rem 1.25rem 1.25rem; }
    .num { font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.12em; color: #71717a; text-transform: uppercase; }
    .name { font-size: 1rem; font-weight: 600; margin: 0.25rem 0 0.375rem; }
    .desc { font-size: 0.8125rem; color: #a1a1aa; line-height: 1.5; }
    .swatches { display: flex; gap: 0.375rem; margin-top: 0.75rem; }
    .swatch { width: 1.25rem; height: 1.25rem; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
    .badge { display: inline-block; font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #60a5fa; background: rgba(59,130,246,0.1); padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: 0.5rem; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Choose a design</h1>
    <p class="intro">Ten institutional-grade landing pages for a six-figure domain sale. Language, layout, and tone calibrated for qualified strategic acquirers — corporate development teams, PE portfolio companies, and institutional brand holders.</p>
    <div class="grid" id="grid"></div>
  </div>
  <script>
    const designs = [
      { id: "01", slug: "sovereign-reserve", name: "Sovereign Reserve", desc: "Platinum private-bank aesthetic. Tier-one asset, private treaty sale.", colors: ["#141416", "#e8e6e3", "#2a2a2c"] },
      { id: "02", slug: "trophy-asset", name: "Trophy Asset", desc: "Luxury real-estate listing format. Cinematic hero, gold accents.", colors: ["#0b0b0c", "#c4b896", "#1a2332"] },
      { id: "03", slug: "auction-catalog", name: "Auction Catalog", desc: "Christie's lot listing. Provenance, estimate, catalogue gravitas.", colors: ["#faf8f5", "#2c2c2c", "#d4cfc6"] },
      { id: "04", slug: "investment-memorandum", name: "Investment Memorandum", desc: "Confidential PE deal memo. Red stamp, structured rationale.", colors: ["#ffffff", "#8b1a1a", "#f0eeeb"] },
      { id: "05", slug: "private-office", name: "Private Office", desc: "Ultra-minimal. Bodoni, vast whitespace. By arrangement only.", colors: ["#fefefe", "#111111", "#f5f5f5"] },
      { id: "06", slug: "fintech-trust", name: "Fintech Trust", kept: true, desc: "Banking-grade credibility. Trust-blue, asset overview panel.", colors: ["#ffffff", "#0f4c81", "#e8f1f8"] },
      { id: "07", slug: "horizon-capital", name: "Horizon Capital", desc: "Gold horizon line on midnight sky. Institutional thesis statement.", colors: ["#060a12", "#c9a962", "#0c1424"] },
      { id: "08", slug: "meridian-advisory", name: "Meridian Advisory", desc: "M&A advisory letter. Formal correspondence to prospective acquirers.", colors: ["#ffffff", "#2a2a2a", "#eceae6"] },
      { id: "09", slug: "atelier-maison", name: "Atelier Maison", desc: "Fashion-house split layout. Edition of one. Collector's piece.", colors: ["#2c2420", "#f5f0eb", "#9a8b7e"] },
      { id: "10", slug: "monolith", name: "Monolith", desc: "Massive domain name on black. Nothing else. Pure authority.", colors: ["#000000", "#ffffff", "#222222"] },
    ];
    document.getElementById("grid").innerHTML = designs.map(d => `
      <a class="card${d.kept ? " kept" : ""}" href="/designs/${d.id}-${d.slug}/">
        <div class="preview" style="background:${d.colors[0]}">
          <iframe src="/designs/${d.id}-${d.slug}/" loading="lazy" title="${d.name} preview"></iframe>
        </div>
        <div class="meta">
          <div class="num">Design ${d.id}${d.kept ? '<span class="badge">Kept</span>' : ""}</div>
          <div class="name">${d.name}</div>
          <div class="desc">${d.desc}</div>
          <div class="swatches">${d.colors.map(c => `<span class="swatch" style="background:${c}"></span>`).join("")}</div>
        </div>
      </a>
    `).join("");
  </script>
</body>
</html>
