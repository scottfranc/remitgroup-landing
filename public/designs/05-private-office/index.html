<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="remitgroup.com — By private arrangement only." />
  <title>Remit Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px}
    body{font-family:"Bodoni Moda",Georgia,serif;background:#fefefe;color:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;line-height:1.8}
    .content{text-align:center;max-width:28rem}
    .wordmark{font-size:.6875rem;letter-spacing:.45em;text-transform:uppercase;margin-bottom:6rem;opacity:.35}
    .domain{font-size:clamp(1.5rem,4vw,2rem);font-weight:400;letter-spacing:.08em;margin-bottom:4rem}
    .statement{font-size:1rem;font-style:italic;font-weight:400;opacity:.55;margin-bottom:5rem;line-height:1.9;max-width:24ch;margin-left:auto;margin-right:auto}
    .arrangement{font-size:.5625rem;letter-spacing:.3em;text-transform:uppercase;opacity:.3;margin-bottom:3rem}
    .cta{font-size:.5625rem;letter-spacing:.25em;text-transform:uppercase;color:#111;text-decoration:none;border-bottom:1px solid rgba(0,0,0,.2);padding-bottom:.25rem;transition:opacity .2s}
    .cta:hover{opacity:.5}
    .cta-note{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;opacity:.25;margin-top:2.5rem}
    .back{position:fixed;top:2.5rem;right:2.5rem;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;opacity:.2;text-decoration:none;color:#111}
    .back:hover{opacity:.6}
  </style>
</head>
<body>
  <a class="back" href="/designs/">←</a>
  <div class="content">
    <p class="wordmark">Remit Group</p>
    <p class="domain">remitgroup.com</p>
    <p class="statement">A singular global address, held in private stewardship, now offered by arrangement.</p>
    <p class="arrangement">Private treaty · Qualified acquirers</p>
    <a class="cta" href="mailto:acquire@remitgroup.com?subject=Private%20Arrangement%20%E2%80%94%20remitgroup.com">Strategic Acquisition Inquiries — Contact Us</a>
    <p class="cta-note">Confidential</p>
  </div>
</body>
</html>
