<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Remit Group — Premium digital asset available for strategic acquisition." />
  <title>Remit Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:#fff;color:#000;min-height:100vh;line-height:1.5;font-weight:300}
    .page{min-height:100vh;display:flex;flex-direction:column;max-width:56rem;margin:0 auto;padding:4rem 2rem}
    .header{margin-bottom:auto;padding-bottom:6rem}
    .logo{font-size:.6875rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase}
    .hero{padding:4rem 0}
    .headline{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;line-height:1.05;letter-spacing:-.03em;margin-bottom:3rem;max-width:14ch}
    .subhead{font-size:1rem;color:#666;max-width:36ch;margin-bottom:4rem;line-height:1.7}
    .subhead strong{color:#000;font-weight:500}
    .cta{display:inline-block;font-size:.8125rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#000;text-decoration:none;border-bottom:1px solid #000;padding-bottom:.25rem;transition:opacity .2s}
    .cta:hover{opacity:.5}
    .cta-note{font-size:.75rem;color:#999;margin-top:1.5rem}
    .meta{display:flex;gap:4rem;margin-top:auto;padding-top:6rem;border-top:1px solid #e5e5e5}
    .meta-item{display:flex;flex-direction:column;gap:.25rem}
    .meta-label{font-size:.625rem;letter-spacing:.15em;text-transform:uppercase;color:#999}
    .meta-value{font-size:.875rem;font-weight:400}
    .footer{margin-top:4rem;font-size:.6875rem;color:#999;letter-spacing:.02em}
    .back{position:fixed;top:2rem;right:2rem;font-size:.6875rem;color:#999;text-decoration:none;letter-spacing:.05em;text-transform:uppercase}
    .back:hover{color:#000}
    @media(max-width:640px){.meta{flex-direction:column;gap:2rem}.page{padding:3rem 1.5rem}}
  </style>
</head>
<body>
  <a class="back" href="/designs/">← Designs</a>
  <div class="page">
    <header class="header"><div class="logo">Remit Group</div></header>
    <main class="hero">
      <h1 class="headline">A globally recognised brand identity.</h1>
      <p class="subhead"><strong>remitgroup.com</strong> — a distinctive .com domain for enterprises and strategic acquirers.</p>
      <a class="cta" href="mailto:acquire@remitgroup.com?subject=Strategic%20Acquisition%20Inquiry%20%E2%80%94%20remitgroup.com">Strategic Acquisition Inquiries — Contact Us</a>
      <p class="cta-note">Confidential. Response within 48 hours.</p>
    </main>
    <div class="meta">
      <div class="meta-item"><span class="meta-label">Domain</span><span class="meta-value">remitgroup.com</span></div>
      <div class="meta-item"><span class="meta-label">Extension</span><span class="meta-value">.com</span></div>
      <div class="meta-item"><span class="meta-label">Status</span><span class="meta-value">Available</span></div>
    </div>
    <footer class="footer">&copy; <span id="y"></span> Remit Group</footer>
  </div>
  <script>document.getElementById("y").textContent=new Date().getFullYear()</script>
</body>
</html>
