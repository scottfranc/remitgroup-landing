<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="remitgroup.com" />
  <title>remitgroup.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Archivo,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .monolith{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .domain{font-size:clamp(2rem,8vw,6rem);font-weight:600;letter-spacing:-.03em;line-height:1;text-transform:lowercase}
    .domain .dot{color:#333}
    .tier{font-size:clamp(.5625rem,1.5vw,1rem);font-weight:300;letter-spacing:.5em;text-transform:uppercase;color:#444;margin-top:2.5rem}
    .bottom{padding:2rem 2rem 3rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
    .cta{font-size:.625rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#666;text-decoration:none;border:1px solid #222;padding:1rem 2.5rem;transition:color .3s,border-color .3s}
    .cta:hover{color:#fff;border-color:#444}
    .cta-note{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:#333}
    .back{position:fixed;top:2rem;right:2rem;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:#333;text-decoration:none;z-index:10}
    .back:hover{color:#666}
  </style>
</head>
<body>
  <a class="back" href="/designs/">←</a>
  <div class="monolith">
    <h1 class="domain">remitgroup<span class="dot">.</span>com</h1>
    <p class="tier">Private Treaty · Institutional Tier</p>
  </div>
  <div class="bottom">
    <a class="cta" href="mailto:acquire@remitgroup.com?subject=Acquisition%20Inquiry%20%E2%80%94%20remitgroup.com">Strategic Acquisition Inquiries — Contact Us</a>
    <p class="cta-note">Qualified buyers · Confidential</p>
  </div>
</body>
</html>
